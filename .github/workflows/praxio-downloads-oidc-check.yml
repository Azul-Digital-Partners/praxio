name: Praxio downloads OIDC capability check

# Verifies that the praxio-release GitHub Actions environment can assume the
# AWS OIDC role and:
#   - CAN write under s3://${PRAXIO_DOWNLOADS_BUCKET}/stable/
#   - CANNOT write under any other prefix (negative test must fail with AccessDenied)
#   - CAN serve the uploaded probe via CloudFront at https://downloads.praxio.app/stable/...
#
# Acceptance criteria for AZU-1835. Safe to run repeatedly — each run uses a
# unique probe key and cleans up after itself (best-effort).

on:
  workflow_dispatch:
    inputs:
      keep_probe:
        description: Leave the probe object behind so /stable/probe-latest.txt stays fresh.
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for OIDC

jobs:
  oidc-check:
    name: OIDC capability check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: praxio-release

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      BUCKET: ${{ vars.PRAXIO_DOWNLOADS_BUCKET }}
      DISTRIBUTION_ID: ${{ vars.PRAXIO_CLOUDFRONT_DISTRIBUTION_ID }}
      DOMAIN: downloads.praxio.app

    steps:
      - name: Assume praxio-release OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: praxio-oidc-check-${{ github.run_id }}

      - name: Sanity — show assumed identity
        run: aws sts get-caller-identity

      - name: Positive — PutObject under /stable/ succeeds
        id: positive
        run: |
          set -euo pipefail
          key="stable/probe-${{ github.run_id }}.txt"
          body="praxio downloads probe — run=${{ github.run_id }} sha=${{ github.sha }} at=$(date -u +%FT%TZ)"
          printf '%s\n' "$body" > /tmp/probe.txt
          aws s3 cp /tmp/probe.txt "s3://${BUCKET}/${key}" \
            --content-type text/plain \
            --cache-control "no-store"
          echo "probe_key=${key}" >> "$GITHUB_OUTPUT"
          echo "Uploaded s3://${BUCKET}/${key}"

      - name: Positive — also refresh /stable/probe-latest.txt
        if: ${{ inputs.keep_probe }}
        run: |
          set -euo pipefail
          aws s3 cp /tmp/probe.txt "s3://${BUCKET}/stable/probe-latest.txt" \
            --content-type text/plain \
            --cache-control "no-store"

      - name: Negative — PutObject under /beta/ MUST fail with AccessDenied
        run: |
          set +e
          aws s3 cp /tmp/probe.txt "s3://${BUCKET}/beta/probe-${{ github.run_id }}.txt" \
            --content-type text/plain 2>/tmp/beta_err.log
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: OIDC role was able to write under /beta/. The IAM policy is too broad."
            exit 1
          fi
          if ! grep -qiE "AccessDenied|Forbidden|denied" /tmp/beta_err.log; then
            echo "FAIL: write to /beta/ failed for the wrong reason. Expected AccessDenied:"
            cat /tmp/beta_err.log
            exit 1
          fi
          echo "OK: /beta/ write denied as expected"
          cat /tmp/beta_err.log

      - name: Negative — PutObject at bucket root MUST fail with AccessDenied
        run: |
          set +e
          aws s3 cp /tmp/probe.txt "s3://${BUCKET}/probe-root-${{ github.run_id }}.txt" \
            --content-type text/plain 2>/tmp/root_err.log
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: OIDC role was able to write at bucket root. The IAM policy is too broad."
            exit 1
          fi
          if ! grep -qiE "AccessDenied|Forbidden|denied" /tmp/root_err.log; then
            echo "FAIL: write at bucket root failed for the wrong reason:"
            cat /tmp/root_err.log
            exit 1
          fi
          echo "OK: bucket-root write denied as expected"

      - name: Invalidate the probe path on CloudFront
        if: ${{ env.DISTRIBUTION_ID != '' }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/${{ steps.positive.outputs.probe_key }}" "/stable/probe-latest.txt"

      - name: Verify CloudFront serves the probe
        run: |
          set -euo pipefail
          url="https://${DOMAIN}/${{ steps.positive.outputs.probe_key }}"
          # CloudFront edge propagation can take ~30s after invalidation.
          for attempt in 1 2 3 4 5 6; do
            if curl -fsSI "$url" >/dev/null; then
              echo "OK: ${url} served by CloudFront"
              curl -fsSI "$url"
              exit 0
            fi
            echo "attempt ${attempt}: not yet, sleeping 10s"
            sleep 10
          done
          echo "FAIL: ${url} did not respond 2xx within 60s"
          curl -fsSI "$url" || true
          exit 1

      - name: Cleanup — remove the per-run probe (keeps probe-latest.txt)
        if: always()
        run: |
          set +e
          aws s3 rm "s3://${BUCKET}/${{ steps.positive.outputs.probe_key }}"
          exit 0
