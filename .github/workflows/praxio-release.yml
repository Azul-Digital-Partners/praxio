# Praxio Desktop — signed + notarized + stapled DMG release
#
# Triggers on tag push `praxio-v*` (e.g. `praxio-v0.1.0`) and on manual
# workflow_dispatch (with an optional `dry_run` toggle that builds + signs
# + notarizes but does NOT stage artifacts for distribution).
#
# Phase B-1 (AZU-1833): build only. Distribution to S3/CloudFront is gated
# to Phase B-3. SBOM + signed release manifest is Phase B-6. Auto-update
# wiring is Phase C. This workflow stages artifacts as GH Actions artifacts;
# Phase B-3 will add the upload step that consumes them.
#
# Secrets (provisioned in GitHub Actions environment `praxio-release`):
#   APPLE_CERT_P12_BASE64        Developer ID Application .p12, base64-encoded
#   APPLE_CERT_PASSWORD          .p12 export password
#   APPLE_TEAM_ID                Developer Team ID (e.g. LG82A2ZSA4)
#   NOTARYTOOL_KEY_ID            App Store Connect API Key ID
#   NOTARYTOOL_ISSUER_ID         App Store Connect Issuer ID (UUID)
#   NOTARYTOOL_KEY_P8_BASE64     AuthKey_*.p8 contents, base64-encoded
#   CSC_LINK                     File path or base64 of the cert. We set
#                                this at runtime to the decoded .p12 path,
#                                so the secret value is unused but kept
#                                for parity with electron-builder docs.
#   CSC_KEY_PASSWORD             Same as APPLE_CERT_PASSWORD; kept distinct
#                                so electron-builder picks it up under its
#                                canonical env var name.
#
# Required reviewers on the `praxio-release` GitHub environment on first
# use of new secret material: Steven and/or Rosalind.

name: Praxio Release

on:
  push:
    tags:
      - "praxio-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build + sign + notarize but skip artifact staging"
        required: true
        type: boolean
        default: false

concurrency:
  group: praxio-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build_mac:
    name: Build, sign, notarize, staple (macOS arm64 + x64)
    runs-on: macos-14
    timeout-minutes: 60
    environment: praxio-release

    env:
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_IDENTITY_AUTO_DISCOVERY: "true"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
      NOTARYTOOL_ISSUER_ID: ${{ secrets.NOTARYTOOL_ISSUER_ID }}
      KEYCHAIN_NAME: praxio-release-${{ github.run_id }}-${{ github.run_attempt }}.keychain-db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Pre-pack assertion — embedded-postgres binaries for both arches
        # electron-builder must be able to fan out per-arch postgres binaries
        # into each DMG. If either directory is missing the resulting DMG
        # will boot on one arch and silently break on the other.
        run: |
          set -euo pipefail
          for arch in darwin-arm64 darwin-x64; do
            dir="node_modules/@embedded-postgres/${arch}"
            if [[ ! -d "$dir" ]]; then
              echo "::error::Missing embedded-postgres binary directory: $dir"
              echo "::error::Both @embedded-postgres/darwin-arm64 and @embedded-postgres/darwin-x64 must be installed before pack."
              exit 1
            fi
            echo "ok: $dir"
          done
          for arch in darwin-arm64 darwin-x64; do
            dir="electron/node_modules/@embedded-postgres/${arch}"
            if [[ ! -d "$dir" ]]; then
              echo "::error::Missing embedded-postgres binary directory in electron workspace: $dir"
              exit 1
            fi
            echo "ok: $dir"
          done

      - name: Decode signing material
        id: decode_signing
        run: |
          set -euo pipefail
          umask 077
          cert_path="$RUNNER_TEMP/praxio-cert.p12"
          key_path="$RUNNER_TEMP/AuthKey.p8"
          echo "${{ secrets.APPLE_CERT_P12_BASE64 }}" | base64 -d > "$cert_path"
          echo "${{ secrets.NOTARYTOOL_KEY_P8_BASE64 }}" | base64 -d > "$key_path"
          chmod 600 "$cert_path" "$key_path"
          for f in "$cert_path" "$key_path"; do
            if [[ ! -s "$f" ]]; then
              echo "::error::Decoded signing artifact is empty: $f"
              exit 1
            fi
          done
          {
            echo "cert_path=$cert_path"
            echo "key_path=$key_path"
          } >> "$GITHUB_OUTPUT"
          {
            echo "CSC_LINK=$cert_path"
            echo "NOTARYTOOL_KEY_PATH=$key_path"
          } >> "$GITHUB_ENV"

      - name: Create ephemeral signing keychain
        run: |
          set -euo pipefail
          umask 077
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" "$HOME/Library/Keychains/login.keychain-db" || true
          security set-keychain-settings -lut 7200 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          security import "${{ steps.decode_signing.outputs.cert_path }}" \
            -k "$KEYCHAIN_NAME" \
            -P "${{ secrets.APPLE_CERT_PASSWORD }}" \
            -t cert -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          echo "::add-mask::${{ secrets.APPLE_TEAM_ID }}"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep -q "Developer ID Application" \
            || { echo "::error::No Developer ID Application identity found in ephemeral keychain"; exit 1; }

      - name: Build server bundle + electron main
        run: |
          set -euo pipefail
          cd electron
          pnpm run build

      - name: Pack DMGs (electron-builder, arm64 + x64)
        # `--publish never` keeps electron-builder from trying to upload to
        # GitHub releases. We stage artifacts ourselves below.
        # Note: the afterSign hook (scripts/electron-notarize.mjs) runs
        # notarytool inline; @electron/notarize v2 uses `notarytool submit
        # --wait` under the hood, so the 30-minute budget is enforced by
        # the job timeout-minutes plus this step timeout.
        timeout-minutes: 45
        env:
          DEBUG: "electron-builder"
        run: |
          set -euo pipefail
          pnpm exec electron-builder \
            --config electron-builder.yml \
            --mac --arm64 --x64 \
            --publish never

      - name: List build outputs
        if: always()
        run: |
          ls -la dist-electron/ || true
          find dist-electron -maxdepth 2 -type f \( -name "*.dmg" -o -name "*.blockmap" -o -name "latest-mac.yml" \) 2>/dev/null || true

      - name: Verify signatures + stapled notarization tickets
        run: |
          set -euo pipefail
          ./scripts/praxio-release-smoke.sh dist-electron

      - name: Stage artifacts for distribution (Phase B-3 will consume)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          set -euo pipefail
          stage_dir="$RUNNER_TEMP/praxio-staged"
          mkdir -p "$stage_dir"
          rsync -a \
            --include "*.dmg" \
            --include "*.dmg.blockmap" \
            --include "latest-mac.yml" \
            --include "latest-mac*.yml" \
            --include "builder-debug.yml" \
            --include "builder-effective-config.yaml" \
            --exclude "*" \
            dist-electron/ "$stage_dir/"
          ls -la "$stage_dir"
          echo "Staged $(find "$stage_dir" -type f | wc -l) artifact(s) for Phase B-3 upload."

      - name: Upload DMGs + blockmaps + latest-mac.yml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: praxio-dmg-${{ github.run_id }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml
            dist-electron/latest-mac*.yml
          if-no-files-found: error
          retention-days: 14

      - name: Upload builder debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: praxio-builder-debug-${{ github.run_id }}
          path: |
            builder-debug.yml
            dist-electron/builder-debug.yml
            dist-electron/builder-effective-config.yaml
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup ephemeral keychain + signing material
        if: always()
        run: |
          set +e
          if [[ -n "${KEYCHAIN_NAME:-}" ]]; then
            security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db" || true
            security delete-keychain "$KEYCHAIN_NAME" || true
          fi
          if [[ -n "${RUNNER_TEMP:-}" ]]; then
            rm -f "$RUNNER_TEMP/praxio-cert.p12" "$RUNNER_TEMP/AuthKey.p8"
          fi
          rm -rf "$HOME/Library/Caches/electron-builder" || true
          true
