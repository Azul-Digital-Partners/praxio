appId: com.azuldigital.praxio
productName: Praxio
copyright: Copyright (c) 2026 Azul Digital LLC

# Pin Electron version explicitly because the dependency lives in the workspace
# package (electron/) rather than the repo root where electron-builder runs from.
electronVersion: "42.3.0"

# Run electron-builder from the repo root; the Electron app code lives in ./electron.
directories:
  app: electron
  output: dist-electron
  buildResources: electron/build

# Files included in the packaged app from inside `electron/`.
# We ship both bundled outputs (main.mjs + server.bundle.mjs) plus the
# locally-installed node_modules for native modules that the server bundle
# imports at runtime as externals (embedded-postgres, sharp, …).
files:
  - "package.json"
  - "dist/**/*"
  - "node_modules/**/*"

# Files copied from the repo root into the app's resources (read-only).
# The server resolves these via PAPERCLIP_UI_DIST / PAPERCLIP_DB_MIGRATIONS_DIR
# (set by electron/src/main.ts to `process.resourcesPath`).
extraResources:
  - from: "server/ui-dist"
    to: "app/server/ui-dist"
    filter: ["**/*"]
  - from: "packages/db/src/migrations"
    to: "app/packages/db/migrations"
    filter: ["**/*"]

# Ensure native modules are rebuilt against Electron's Node ABI at pack time.
npmRebuild: true
nodeGypRebuild: false

# Use asar so the app loads quickly, but unpack:
#   - native modules whose binaries must be on disk to dlopen / spawn
#   - packages that spawn worker_threads with a file path computed from their
#     own __dirname (pino + thread-stream)
#   - the bundled server itself, so the utility-process fork sees its
#     externals via real-filesystem node_modules resolution
# Unpacking *all* of node_modules makes codesign iterate over tens of
# thousands of files (postgres timezone data for two arches) and stalls the
# build for >30 min, so we keep the unpack list explicit.
asar: true
# Every external in build.mjs (anything `esbuild` does not inline) must be
# reachable via Node's standard module walk from the bundle's on-disk location
# (app.asar.unpacked/dist/server.bundle.mjs). Bundling does not work for these
# packages — see build.mjs for the per-package reasoning — so they must live
# in app.asar.unpacked/node_modules/ alongside their transitive deps.
#
# The list below is the transitive closure (via pnpm) of:
#   - the JS-only externals: @cursor/sdk, @anthropic-ai/claude-agent-sdk,
#     hermes-paperclip-adapter, jsdom, ws
#   - native + worker_thread packages: embedded-postgres + per-arch,
#     sharp + @img, better-sqlite3, pino + transport chain
#
# Unpacking node_modules/**/* would force codesign to walk 50k+ files
# sequentially (multi-hour signing). The explicit list keeps that bounded.
asarUnpack:
  # embedded-postgres + per-arch postgres binaries (initdb, pg_ctl).
  - "node_modules/embedded-postgres/**/*"
  - "node_modules/@embedded-postgres/**/*"
  # sharp Node-API binding + libvips per-arch.
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
  - "node_modules/better-sqlite3/**/*"
  # pino transport + worker_threads chain. thread-stream's worker.js path is
  # built from pino's __dirname, so the file must be on the real filesystem.
  - "node_modules/pino/**/*"
  - "node_modules/pino-http/**/*"
  - "node_modules/pino-pretty/**/*"
  - "node_modules/pino-abstract-transport/**/*"
  - "node_modules/pino-std-serializers/**/*"
  - "node_modules/thread-stream/**/*"
  - "node_modules/real-require/**/*"
  # Closure of JS-only externals (jsdom, @cursor/sdk, @anthropic-ai/claude-agent-sdk,
  # hermes-paperclip-adapter, ws). Generated via `pnpm list --json --prod
  # --depth=Infinity` from electron/.
  - "node_modules/@acemir/cssom/**/*"
  - "node_modules/@anthropic-ai/claude-agent-sdk/**/*"
  - "node_modules/@anthropic-ai/claude-agent-sdk-darwin-arm64/**/*"
  - "node_modules/@anthropic-ai/claude-agent-sdk-darwin-x64/**/*"
  - "node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64/**/*"
  - "node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64-musl/**/*"
