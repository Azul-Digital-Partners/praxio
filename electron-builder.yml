appId: com.azuldigital.praxio
productName: Praxio
copyright: Copyright (c) 2026 Azul Digital LLC

# Pin Electron version explicitly because the dependency lives in the workspace
# package (electron/) rather than the repo root where electron-builder runs from.
electronVersion: "42.3.0"

# Run electron-builder from the repo root; the Electron app code lives in ./electron.
directories:
  app: electron
  output: dist-electron
  buildResources: electron/build

# Files included in the packaged app from inside `electron/`.
# We ship both bundled outputs (main.mjs + server.bundle.mjs) plus the
# locally-installed node_modules for native modules that the server bundle
# imports at runtime as externals (embedded-postgres, sharp, …).
files:
  - "package.json"
  - "dist/**/*"
  - "node_modules/**/*"

# Files copied from the repo root into the app's resources (read-only).
# The server resolves these via PAPERCLIP_UI_DIST / PAPERCLIP_DB_MIGRATIONS_DIR
# (set by electron/src/main.ts to `process.resourcesPath`).
extraResources:
  - from: "server/ui-dist"
    to: "app/server/ui-dist"
    filter: ["**/*"]
  - from: "packages/db/src/migrations"
    to: "app/packages/db/migrations"
    filter: ["**/*"]

# Ensure native modules are rebuilt against Electron's Node ABI at pack time.
npmRebuild: true
nodeGypRebuild: false

# Use asar so the app loads quickly, but unpack native modules so they can dlopen.
asar: true
asarUnpack:
  - "node_modules/embedded-postgres/**/*"
  # The actual postgres binary lives in per-arch scoped packages
  # (@embedded-postgres/darwin-arm64, @embedded-postgres/darwin-x64, etc.).
  # postgres must be a real on-disk file with the exec bit, so it cannot
  # stay inside app.asar. See AZU-1828.
  - "node_modules/@embedded-postgres/**/*"
  # sharp: native Node-API binding + libvips per-arch packages, dlopen'd at
  # runtime. Must live on the real filesystem, not inside app.asar.
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "**/*.node"

mac:
  category: public.app-category.developer-tools
  artifactName: "Praxio-${version}-${arch}.${ext}"
  # Multi-resolution Praxio icon. electron-builder resolves this against
  # `directories.buildResources` (electron/build/). Generated by
  # scripts/generate-praxio-brand-assets.py.
  icon: electron/build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Hardened runtime is required for notarization.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/build/entitlements.mac.plist
  entitlementsInherit: electron/build/entitlements.mac.inherit.plist
  # Identity is picked up automatically from the keychain by partial-name match.
  # Set CSC_IDENTITY_AUTO_DISCOVERY=true (default) and the cert must be installed.
  identity: "Azul Digital LLC (LG82A2ZSA4)"
  notarize: false  # Notarization runs via the afterSign hook below.

dmg:
  artifactName: "Praxio-${version}-${arch}.dmg"
  # Sign the DMG itself with the same Developer ID identity as the .app.
  # The DMG must be signed *and* the notarization ticket stapled to it for a
  # clean Gatekeeper experience on first mount.
  sign: true
  # Branded DMG window backdrop. Sized 540x380 with @2x retina variant alongside.
  background: electron/build/background.png
  window:
    width: 540
    height: 380
  iconSize: 96
  # Standard "drag to Applications" layout, aligned with the arrow in the
  # background art (y=220 in a 540x380 window).
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

afterSign: scripts/electron-notarize.mjs
